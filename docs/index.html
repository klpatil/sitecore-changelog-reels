<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sitecore Changelog Reels</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#5C5CE0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SC Reels" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <!-- Prevent flash of wrong theme -->
  <script>document.documentElement.dataset.theme=localStorage.getItem('sc-theme')||'dark';</script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-VD80PPRRP8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-VD80PPRRP8');
  </script>
</head>
<body>

  <!-- ── Top bar ── -->
  <header id="topbar">
    <div id="progress-bar"></div>
    <div id="topbar-inner">
      <!-- Mobile/tablet: horizontal filter pills -->
      <nav id="product-filter">
        <button class="filter-pill active" data-product="all">All</button>
      </nav>
      <span id="card-counter">— / —</span>

      <!-- Search toggle (mobile/tablet) -->
      <button id="search-toggle" class="theme-toggle" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>

      <!-- Theme toggle (always visible) -->
      <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
        <!-- Sun: shown in dark mode — click to go light -->
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon: shown in light mode — click to go dark -->
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

    </div>

    <!-- ── Search bar (mobile/tablet, slides open on toggle) ── -->
    <div id="search-bar">
      <input id="search-input" type="search" placeholder="Search changelog…" autocomplete="off" />
      <button id="search-clear" aria-label="Clear search" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Desktop sidebar (hidden on mobile/tablet) ── -->
  <aside id="sidebar">
    <div class="sb-brand">
      <strong class="sb-title">Sitecore<br>Reels</strong>
      <p class="sb-tagline">Every scroll = value</p>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-section">
      <p class="sb-label">Search</p>
      <div class="sb-search-wrap">
        <svg class="sb-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="sb-search-input" type="search" placeholder="Search changelog…" autocomplete="off" />
        <button id="sb-search-clear" aria-label="Clear" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="sb-section">
      <p class="sb-label">Categories</p>
      <nav id="sidebar-filter"></nav>
    </div>

    <div class="sb-section" id="install-section" hidden>
      <button id="install-btn" class="sb-install-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Install App
      </button>
    </div>

    <div class="sb-section sb-section--push">
      <p class="sb-label">Keyboard</p>
      <div class="sb-keys">
        <kbd class="sb-key">↑</kbd>
        <kbd class="sb-key">↓</kbd>
        <span class="sb-key-hint">to navigate</span>
      </div>
    </div>
  </aside>

  <!-- ── App column ── -->
  <div id="app">

    <!-- Skeleton loader -->
    <div id="skeleton">
      <div class="sk-visual"></div>
      <div class="sk-body">
        <div class="sk-row">
          <div class="sk sk-badge"></div>
          <div class="sk sk-date"></div>
        </div>
        <div class="sk sk-title"></div>
        <div class="sk sk-title sk-short"></div>
        <div class="sk-block">
          <div class="sk sk-tag"></div>
          <div class="sk sk-line"></div>
          <div class="sk sk-line sk-med"></div>
        </div>
        <div class="sk-block">
          <div class="sk sk-tag"></div>
          <div class="sk sk-line"></div>
          <div class="sk sk-line sk-med"></div>
        </div>
      </div>
    </div>

    <!-- Main feed -->
    <div id="feed" hidden></div>

  </div>

  <!-- ── Floating action buttons (mobile/tablet only) ── -->
  <aside id="floatingButtons" class="fabs" hidden>

    <!-- Install FAB (mobile only — hidden until browser allows install) -->
    <button class="fab fab--install" id="install-fab" aria-label="Install app" hidden>
      <svg class="fab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <span class="fab-lbl">Install</span>
    </button>

    <button class="fab" id="bookmarkBtn" aria-label="Bookmark">
      <svg class="fab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span class="fab-lbl">Save</span>
    </button>

    <button class="fab" id="shareBtn" aria-label="Share">
      <svg class="fab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      <span class="fab-lbl">Share</span>
    </button>

    <button class="fab" id="openLinkBtn" aria-label="Open article">
      <svg class="fab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      <span class="fab-lbl">Open</span>
    </button>

  </aside>

  <!-- ── Toast ── -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- ── Branding (mobile only) ── -->
  <p id="branding">Every scroll = value</p>

  <!-- Fuse.js — free, MIT, client-side fuzzy search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
  <script type="module" src="app.js"></script>

  <!-- Service Worker registration (PWA) -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
